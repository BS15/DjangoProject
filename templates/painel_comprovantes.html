<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Processar Comprovantes - System X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-break"></i> Baixa em Lote de Comprovantes</h2>
        <a href="{% url 'home_page' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>

    <div class="card shadow-sm border-0 mb-4 bg-white" id="bloco-upload">
        <div class="card-body py-4 text-center">
            <h5 class="text-primary mb-3">Selecione o PDF gerado pelo Internet Banking</h5>
            <p class="text-muted small">O sistema dividirá o PDF por páginas para que você possa vincular manualmente cada comprovante ao seu respectivo processo.</p>

            <form id="form-upload" class="d-flex justify-content-center gap-2">
                {% csrf_token %}
                <input type="file" id="pdf_banco" name="pdf_banco" class="form-control w-50" accept=".pdf" required>
                <button type="submit" class="btn btn-primary fw-bold px-4" id="btn-processar">
                    Fatiar PDF
                </button>
            </form>
            <div id="loading" class="mt-3 text-warning fw-bold" style="display: none;">
                <div class="spinner-border spinner-border-sm"></div> Separando páginas...
            </div>
        </div>
    </div>

    <div id="bloco-resultados" style="display: none;">
        <div class="d-flex justify-content-between align-items-end mb-3">
            <h5 class="fw-bold m-0 text-secondary">Comprovantes Fatiados</h5>
            <button class="btn btn-success fw-bold shadow-sm" id="btn-salvar-tudo">
                <i class="bi bi-check-all"></i> Confirmar Vínculos e Baixar Processos
            </button>
        </div>

        <div class="row g-3" id="lista-comprovantes">
            </div>
    </div>
</div>

<script>
    // Injeta os processos vindos do Django no Javascript de forma segura
    const processosPendentes = JSON.parse('{{ processos_json|escapejs }}' || '[]');

    // Elementos da tela
    const formUpload = document.getElementById('form-upload');
    const btnProcessar = document.getElementById('btn-processar');
    const loading = document.getElementById('loading');
    const blocoUpload = document.getElementById('bloco-upload');
    const blocoResultados = document.getElementById('bloco-resultados');
    const listaComprovantes = document.getElementById('lista-comprovantes');
    const btnSalvarTudo = document.getElementById('btn-salvar-tudo');

    let comprovantesEmMemoria = [];

    // PASSO 1: Enviar para fatiamento MANUAL
    formUpload.addEventListener('submit', function(e) {
        e.preventDefault();

        const fileInput = document.getElementById('pdf_banco');
        if (!fileInput.files.length) return;

        let formData = new FormData();
        formData.append('pdf_banco', fileInput.files[0]);
        formData.append('modo', 'manual');
        formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

        btnProcessar.disabled = true;
        loading.style.display = 'block';

        fetch('{% url "api_fatiar_comprovantes" %}', {
            method: 'POST',
            body: formData
        })
        .then(async res => {
            // Verifica se o servidor devolveu HTML de erro em vez de JSON
            if (!res.ok) {
                const text = await res.text();
                throw new Error("Erro no Servidor Django. Verifique o Error Log no PythonAnywhere.");
            }
            return res.json();
        })
        .then(data => {
            if (data.sucesso) {
                comprovantesEmMemoria = data.comprovantes || [];
                renderizarCardsManuais();
                blocoUpload.style.display = 'none';
                blocoResultados.style.display = 'block';
            } else {
                alert('Erro ao processar: ' + data.erro);
                btnProcessar.disabled = false;
                loading.style.display = 'none';
            }
        })
        .catch(err => {
            console.error("LOG DE ERRO DETALHADO:", err);
            // AGORA ELE VAI TE MOSTRAR EXATAMENTE O QUE QUEBROU
            alert('Atenção: ' + err.message);
            btnProcessar.disabled = false;
            loading.style.display = 'none';
        });
    });

    // PASSO 2: Desenhar os Cards na Tela (Com proteção contra erros de string)
    function renderizarCardsManuais() {
        listaComprovantes.innerHTML = '';

        let selectOptions = '<option value="">-- Selecione o Processo correspondente --</option>';
        processosPendentes.forEach(p => {
            // PROTEÇÃO: Garante que é tratado como string, mesmo que venha nulo ou como ID numérico
            let nomeCredor = p.credor ? String(p.credor) : 'Credor não informado';
            if (nomeCredor.length > 35) nomeCredor = nomeCredor.substring(0, 35) + '...';

            let valorLiq = p.valor_liquido ? parseFloat(p.valor_liquido).toFixed(2) : '0.00';

            selectOptions += `<option value="${p.id}" data-valor="${valorLiq}">Proc #${p.id} - ${nomeCredor} - R$ ${valorLiq}</option>`;
        });

        comprovantesEmMemoria.forEach((comp, index) => {
            const html = `
                <div class="col-md-6">
                    <div class="card shadow-sm h-100 border-secondary fatia-card" data-path="${comp.temp_path}">
                        <div class="card-header bg-light d-flex justify-content-between align-items-center">
                            <strong>Página ${comp.pagina}</strong>
                            <a href="${comp.url}" target="_blank" class="btn btn-sm btn-outline-danger py-0">
                                <i class="bi bi-file-pdf"></i> Abrir Comprovante
                            </a>
                        </div>
                        <div class="card-body">
                            <label class="small text-muted fw-bold mb-1"><i class="bi bi-link"></i> Vincular a qual Processo?</label>
                            <select class="form-select form-select-sm select-processo">
                                ${selectOptions}
                            </select>
                            <div class="mt-2 small fw-bold text-end status-validacao"></div>
                        </div>
                    </div>
                </div>
            `;
            listaComprovantes.innerHTML += html;
        });

        ativarFeedbackDinamico();
    }

    // PASSO 3: Feedback Visual
    function ativarFeedbackDinamico() {
        document.querySelectorAll('.select-processo').forEach(select => {
            select.addEventListener('change', function() {
                const card = this.closest('.card');
                const divValidacao = card.querySelector('.status-validacao');

                if (this.value === "") {
                    divValidacao.innerHTML = "";
                    card.classList.remove('border-success', 'border-2');
                    card.classList.add('border-secondary');
                } else {
                    const opcaoSelecionada = this.options[this.selectedIndex];
                    const valorProcesso = parseFloat(opcaoSelecionada.getAttribute('data-valor'));

                    divValidacao.innerHTML = `<span class='text-success'><i class='bi bi-check-circle-fill'></i> Vinculado com Sucesso (R$ ${valorProcesso.toFixed(2)})</span>`;
                    card.classList.remove('border-secondary');
                    card.classList.add('border-success', 'border-2');
                }
            });
        });
    }

    // PASSO 4: Enviar Vínculos
    btnSalvarTudo.addEventListener('click', function() {
        let vinculosParaSalvar = [];

        document.querySelectorAll('.fatia-card').forEach(card => {
            const select = card.querySelector('.select-processo');
            const path = card.getAttribute('data-path');

            if (select && select.value !== "") {
                vinculosParaSalvar.push({
                    processo_id: select.value,
                    temp_path: path
                });
            }
        });

        if (vinculosParaSalvar.length === 0) {
            alert("Selecione o processo de destino para pelo menos um comprovante antes de salvar.");
            return;
        }

        if(!confirm(`Deseja efetivar a baixa e alterar para PAGO os ${vinculosParaSalvar.length} processos selecionados?`)) return;

        btnSalvarTudo.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Salvando e anexando...';
        btnSalvarTudo.disabled = true;

        fetch('{% url "api_vincular_comprovantes" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({ vinculos: vinculosParaSalvar })
        })
        .then(res => res.json())
        .then(data => {
            if (data.sucesso) {
                alert(data.mensagem);
                window.location.href = '{% url "home_page" %}';
            } else {
                alert('Erro ao vincular no banco de dados: ' + data.erro);
                btnSalvarTudo.innerHTML = '<i class="bi bi-check-all"></i> Confirmar Vínculos e Baixar Processos';
                btnSalvarTudo.disabled = false;
            }
        })
        .catch(err => {
            console.error(err);
            alert('Erro de conexão ao tentar salvar os vínculos.');
            btnSalvarTudo.disabled = false;
        });
    });
</script>

</body>
</html>
