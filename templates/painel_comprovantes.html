<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Processar Comprovantes - System X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-break"></i> Baixa em Lote de Comprovantes</h2>
        <a href="{% url 'home_page' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>

    <div class="card shadow-sm border-0 mb-4 bg-white" id="bloco-upload">
        <div class="card-body py-4 text-center">
            <h5 class="text-primary mb-3">Selecione o PDF gerado pelo Internet Banking</h5>
            <p class="text-muted small">O sistema dividirá o PDF por páginas e extrairá credores e valores automaticamente.</p>
            
            <form id="form-upload" class="d-flex justify-content-center gap-2">
                {% csrf_token %}
                <input type="file" id="pdf_banco" name="pdf_banco" class="form-control w-50" accept=".pdf" required>
                <button type="submit" class="btn btn-primary fw-bold px-4" id="btn-processar">
                    Processar Fatiamento
                </button>
            </form>
            <div id="loading" class="mt-3 text-warning fw-bold" style="display: none;">
                <div class="spinner-border spinner-border-sm"></div> Lendo e separando páginas...
            </div>
        </div>
    </div>

    <div id="bloco-resultados" style="display: none;">
        <div class="d-flex justify-content-between align-items-end mb-3">
            <h5 class="fw-bold m-0 text-secondary">Comprovantes Identificados</h5>
            <button class="btn btn-success fw-bold shadow-sm" id="btn-salvar-tudo">
                <i class="bi bi-check-all"></i> Confirmar Selecionados e Baixar Processos
            </button>
        </div>

        <div class="row g-3" id="lista-comprovantes">
            </div>
    </div>
</div>

<script>
    // Injeta os processos vindos do Django no Javascript
    const processosPendentes = JSON.parse('{{ processos_json|escapejs }}');

    // Elementos da tela
    const formUpload = document.getElementById('form-upload');
    const btnProcessar = document.getElementById('btn-processar');
    const loading = document.getElementById('loading');
    const blocoUpload = document.getElementById('bloco-upload');
    const blocoResultados = document.getElementById('bloco-resultados');
    const listaComprovantes = document.getElementById('lista-comprovantes');
    const btnSalvarTudo = document.getElementById('btn-salvar-tudo');

    // Guarda os dados fatiados da API
    let comprovantesEmMemoria = [];

    // PASSO 1: Enviar para fatiamento
    formUpload.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById('pdf_banco');
        if (!fileInput.files.length) return;

        let formData = new FormData();
        formData.append('pdf_banco', fileInput.files[0]);
        formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

        btnProcessar.disabled = true;
        loading.style.display = 'block';

        fetch('{% url "api_fatiar_comprovantes" %}', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.sucesso) {
                comprovantesEmMemoria = data.comprovantes;
                renderizarCards();
                blocoUpload.style.display = 'none';
                blocoResultados.style.display = 'block';
            } else {
                alert('Erro ao processar: ' + data.erro);
                btnProcessar.disabled = false;
                loading.style.display = 'none';
            }
        })
        .catch(err => {
            alert('Erro de conexão com o servidor.');
            btnProcessar.disabled = false;
            loading.style.display = 'none';
        });
    });

    // PASSO 2: Desenhar os Cards na Tela
    function renderizarCards() {
        listaComprovantes.innerHTML = ''; // Limpa a lista

        // Prepara as opções do Select HTML
        let selectOptions = '<option value="">-- Não vincular / Ignorar --</option>';
        processosPendentes.forEach(p => {
            selectOptions += `<option value="${p.id}" data-valor="${p.valor_liquido}">Proc #${p.id} - ${p.credor.substring(0,25)} - R$ ${parseFloat(p.valor_liquido).toFixed(2)}</option>`;
        });

        comprovantesEmMemoria.forEach((comp, index) => {
            const html = `
                <div class="col-md-6">
                    <div class="card shadow-sm h-100 border-secondary">
                        <div class="card-header bg-light d-flex justify-content-between align-items-center">
                            <strong>Página ${comp.pagina}</strong>
                            <a href="${comp.url}" target="_blank" class="btn btn-sm btn-outline-danger py-0"><i class="bi bi-file-pdf"></i> Ver Arquivo</a>
                        </div>
                        <div class="card-body">
                            <div class="row g-2 mb-3">
                                <div class="col-8">
                                    <label class="small text-muted fw-bold mb-0">Credor Extraído</label>
                                    <input type="text" class="form-control form-control-sm text-primary" value="${comp.credor_extraido}">
                                </div>
                                <div class="col-4">
                                    <label class="small text-muted fw-bold mb-0">Valor Extraído</label>
                                    <input type="text" class="form-control form-control-sm text-success fw-bold valor-extraido" value="${comp.valor_extraido.toFixed(2)}" readonly>
                                </div>
                            </div>
                            
                            <div class="border-top pt-2">
                                <label class="small text-muted fw-bold mb-1"><i class="bi bi-link"></i> Vincular a qual Processo?</label>
                                <select class="form-select form-select-sm select-processo" data-index="${index}" data-temp="${comp.temp_path}">
                                    ${selectOptions}
                                </select>
                                <div class="mt-2 small fw-bold text-end status-validacao"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            listaComprovantes.innerHTML += html;
        });

        ativarValidacaoDinamica();
    }

    // PASSO 3: Validação de Valores (Javascript)
    function ativarValidacaoDinamica() {
        document.querySelectorAll('.select-processo').forEach(select => {
            select.addEventListener('change', function() {
                const card = this.closest('.card');
                const divValidacao = card.querySelector('.status-validacao');
                const valorExtraido = parseFloat(card.querySelector('.valor-extraido').value);
                
                if (this.value === "") {
                    divValidacao.innerHTML = "";
                    card.classList.remove('border-success', 'border-danger');
                    card.classList.add('border-secondary');
                    return;
                }

                // Pega o valor do processo selecionado escondido no atributo 'data-valor'
                const opcaoSelecionada = this.options[this.selectedIndex];
                const valorProcesso = parseFloat(opcaoSelecionada.getAttribute('data-valor'));

                // Checa se o valor do comprovante bate exatemente com o valor líquido do processo
                if (Math.abs(valorExtraido - valorProcesso) < 0.01) {
                    divValidacao.innerHTML = "<span class='text-success'><i class='bi bi-check-circle-fill'></i> Valores compatíveis. Pronto para baixa.</span>";
                    card.classList.remove('border-secondary', 'border-danger');
                    card.classList.add('border-success', 'border-2');
                } else {
                    divValidacao.innerHTML = `<span class='text-danger'><i class='bi bi-exclamation-triangle-fill'></i> Cuidado: Valor do Processo (R$ ${valorProcesso.toFixed(2)}) diverge do PDF.</span>`;
                    card.classList.remove('border-secondary', 'border-success');
                    card.classList.add('border-danger', 'border-2');
                }
            });
        });
    }

    // PASSO 4: Enviar Vínculos para Baixa
    btnSalvarTudo.addEventListener('click', function() {
        let vinculosParaSalvar = [];

        document.querySelectorAll('.select-processo').forEach(select => {
            if (select.value !== "") {
                vinculosParaSalvar.push({
                    processo_id: select.value,
                    temp_path: select.getAttribute('data-temp')
                });
            }
        });

        if (vinculosParaSalvar.length === 0) {
            alert("Selecione o processo de destino para pelo menos um comprovante.");
            return;
        }

        if(!confirm(`Deseja baixar e alterar para PAGO os ${vinculosParaSalvar.length} processos selecionados?`)) return;

        btnSalvarTudo.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Salvando...';
        btnSalvarTudo.disabled = true;

        fetch('{% url "api_vincular_comprovantes" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({ vinculos: vinculosParaSalvar })
        })
        .then(res => res.json())
        .then(data => {
            if (data.sucesso) {
                alert(data.mensagem);
                window.location.href = '{% url "home_page" %}'; // Redireciona para atualizar as filas
            } else {
                alert('Erro ao vincular: ' + data.erro);
                btnSalvarTudo.innerHTML = '<i class="bi bi-check-all"></i> Confirmar e Baixar';
                btnSalvarTudo.disabled = false;
            }
        })
        .catch(err => {
            alert('Erro de conexão ao tentar vincular.');
            btnSalvarTudo.disabled = false;
        });
    });
</script>

</body>
</html>
