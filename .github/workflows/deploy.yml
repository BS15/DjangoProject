name: Deploy to PythonAnywhere

on:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-django

      - name: Run linter
        run: flake8 .

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: DjangoProject.settings
        run: pytest

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via PythonAnywhere API
        uses: umuttopalak/pythonanywhere-deploy-action@v1.1.0
        with:
          username: ${{ secrets.PA_USERNAME }}
          api_token: ${{ secrets.PA_API_TOKEN }}
          domain_name: ${{ secrets.PA_DOMAIN_NAME }}