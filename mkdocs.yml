site_name: Wiki PaGé
site_description: Documentação de negócio, arquitetura e operação do PaGé
site_url: ""
repo_name: DjangoProject
edit_uri: ""

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - .
          options:
            show_root_heading: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Início: index.md
  - Visão Geral e Negócio:
      - Missão do Sistema: negocio/missao_sistema.md
      - Glossário do Conselho: negocio/glossario_conselho.md
  - Arquitetura de Software:
      - Padrão Manager-Worker: arquitetura/manager_worker.md
      - Camada de Services: arquitetura/camada_services.md
      - Hub-and-Spoke: arquitetura/hub_spoke.md
  - Manual de Módulos:
      - Pagamentos Core: modulos/pagamentos_core.md
      - Verbas Indenizatórias: modulos/verbas_indenizatorias.md
      - Suprimento de Fundos: modulos/suprimento_fundos.md
      - Fluxo Core: modulos/fluxo_core.md
      - Módulo Fiscal: modulos/modulo_fiscal.md
  - Segurança e Governança:
      - Trilha de Auditoria: governanca/trilha_auditoria.md
      - Matriz de Permissões: governanca/matriz_permissoes.md
  - Guia do Desenvolvedor:
      - Setup de Ambiente: desenvolvedor/setup_ambiente.md
      - Dicionários Operacionais: desenvolvedor/dicionarios_operacionais.md
      - Funcionalidades Transversais: desenvolvedor/funcionalidades_transversais.md
      - Padrões de Código: desenvolvedor/padroes_codigo.md
    - Interface Hub-and-Spoke: arquitetura/hub_spoke.md
    - Camada de Services: arquitetura/camada_services.md
  - Manual de Módulos (Funcional):
    - Fluxo Core: modulos/fluxo_core.md
    - Verbas Indenizatórias: modulos/verbas_indenizatorias.md
    - Suprimento de Fundos: modulos/suprimento_fundos.md
    - Módulo Fiscal: modulos/modulo_fiscal.md
  - Segurança e Governança:
    - Matriz de Permissões (RBAC): governanca/matriz_permissoes.md
    - Trilha de Auditoria: governanca/trilha_auditoria.md
  - Guia do Desenvolvedor:
    - Setup do Ambiente: desenvolvedor/setup_ambiente.md
    - Padrões de Código: desenvolvedor/padroes_codigo.md
    - Dicionários Operacionais: desenvolvedor/dicionarios_operacionais.md
    - Guia de Instalação: instalacao.md
    - Referência de API: api.md