site_name: Wiki Técnica - Backoffice Financeiro
site_description: Documentação de código e arquitetura do sistema Django
site_url: ""
repo_name: DjangoProject
edit_uri: ""

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - .
          options:
            show_root_heading: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Início: index.md
  - Como Gerar a Wiki: como_gerar.md
  - Workflows Operacionais:
      - Catálogo de Workflows: workflows.md
      - Pagamentos End-to-End: workflow_pagamentos_end_to_end.md
      - Fiscal (Liquidação e Retenções): workflow_fiscal_liquidacao.md
      - Verbas Indenizatórias: workflow_verbas_indenizatorias.md
      - Suprimentos de Fundos: workflow_suprimentos_fundos.md
      - Contingências e Devoluções: workflow_contingencias_devolucoes.md
      - Conselho e Arquivamento: workflow_conselho_arquivamento.md
      - Assinaturas Digitais: workflow_assinaturas_digitais.md
      - Contas Fixas: workflow_contas_fixas.md
      - Integrações e Importações: workflow_integracoes_importacao.md
  - Fluxo Orçamentário (Turnpike):
      - Visão Geral do Fluxo: workflow_overview.md
      - Etapa A EMPENHAR: etapa_a_empenhar.md
      - Etapa AGUARDANDO LIQUIDAÇÃO: etapa_aguardando_liquidacao.md
      - Etapa A PAGAR: etapa_a_pagar.md
      - Etapa PAGO: etapa_pago.md
      - Etapa CONTABILIZADO: etapa_contabilizado.md
      - Etapa ARQUIVADO: etapa_arquivado.md
  - Referência de Código:
      - Banco de Dados (Models): models.md
      - Fluxo de Pré-Pagamento: fluxo_pre.md
      - Fluxo de Pagamento: fluxo_pagamento.md
      - Fluxo de Pós-Pagamento: fluxo_pos.md
      - Utilitários e Serviços: utilitarios.md