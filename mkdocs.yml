site_name: Wiki PaGé
site_description: Documentação de negócio, arquitetura e operação do PaGé
site_url: ""
repo_name: DjangoProject
edit_uri: ""

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - .
          options:
            show_root_heading: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Início: index.md
  - Visão Geral e Negócio:
      - Missão do Sistema: negocio/missao_sistema.md
      - Glossário do Conselho: negocio/glossario_conselho.md
  - Arquitetura de Software:
      - Padrão Manager-Worker: arquitetura/manager_worker.md
      - Hub-and-Spoke: arquitetura/hub_spoke.md
  - Manual de Módulos:
      - Pagamentos Core: modulos/pagamentos_core.md
      - Verbas Indenizatórias: modulos/verbas_indenizatorias.md
      - Suprimento de Fundos: modulos/suprimento_fundos.md
      - Módulo Fiscal: modulos/modulo_fiscal.md
  - Fluxos Operacionais:
      - Pagamentos: fluxos/pagamentos.md
      - Retenções: fluxos/retencoes.md
      - Diárias: fluxos/diarias.md
      - Suprimento de Fundos: fluxos/suprimento_fundos.md
  - Segurança e Governança:
      - Trilha de Auditoria: governanca/trilha_auditoria.md
      - Matriz de Permissões: governanca/matriz_permissoes.md
  - Guia do Desenvolvedor:
      - Setup do Ambiente: desenvolvedor/setup_ambiente.md
      - Padrões de Código: desenvolvedor/padroes_codigo.md
      - Dicionários Operacionais: desenvolvedor/dicionarios_operacionais.md
      - Funcionalidades Transversais: desenvolvedor/funcionalidades_transversais.md
      - Referência de API: api.md
